kind = "mobile"
previewPath = "/"
title = "SustainServe"
version = "1.0.0"
id = "artifacts/sustain-serve"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22089

[services.development]
run = "pnpm --filter @workspace/sustain-serve run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sustain-serve", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sustain-serve", "run", "serve" ]

[services.env]
PORT = "22089"
BASE_PATH = "/"
